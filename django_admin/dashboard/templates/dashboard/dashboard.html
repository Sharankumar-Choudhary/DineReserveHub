<!DOCTYPE html>
<html>
<head>
    <title>DineReserve Dashboard</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">
        DineReserve Hub Dashboard
    </h2>

    <div class="row">

        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h5>Total Diners</h5>
                    <h1>{{ total_diners }}</h1>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h5>Reservations Today</h5>
                    <h1>{{ total_reservations_today }}</h1>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h5>Available Tables</h5>
                    <h1>{{ available_tables }}</h1>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
